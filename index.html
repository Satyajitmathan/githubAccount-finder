<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            box-sizing: border-box;
        }
        html,body{
            width: 100%;
            height: 100%;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-950 text-white min-h-screen flex items-center justify-center">

  <div class="w-full max-w-4xl p-6">

    <!-- Header -->
    <div class="text-center mb-10">
      <h1 class="text-4xl font-bold tracking-tight">GitHub Profile Finder</h1>
      <p class="text-gray-400 mt-2">Search any GitHub user and view their profile details</p>
    </div>

    <!-- Search Bar -->
    <div class="flex gap-4 mb-10">
      <input 
        type="text" 
        placeholder="Enter GitHub username..." 
        class="usernameinp flex-1 px-4 py-3 rounded-xl bg-gray-900 border border-gray-700 focus:outline-none focus:ring-2 focus:ring-indigo-500"
      />
      <button class="search px-6 py-3 bg-indigo-600 hover:bg-indigo-700 rounded-xl font-semibold transition">
        Search
      </button>
    </div>

    <!-- Profile Card (Dummy Data) -->
    <div class="bg-gray-900 border border-gray-800 rounded-2xl p-6 shadow-lg">
      <div class="card flex flex-col md:flex-row items-center md:items-start gap-6">
        
        <!-- Avatar -->
       
      </div>
    </div>

    <!-- Footer -->
    <div class="text-center text-gray-500 mt-10 text-sm">
      Built with Tailwind CSS • Modern UI
    </div>

  </div>
<script src="index.js"></script>
</body>
</html>
